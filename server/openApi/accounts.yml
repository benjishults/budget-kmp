openapi: 3.1.1

info:
  title: Accounts
  version: "0.1"
  summary: Endpoints related to accounts

paths:
  /budgetId/{budgetId}/accounts:
    summary: Accounts
    parameters:
      - $ref: "#/components/parameters/budgetIdParam"
      - $ref: "#/components/parameters/accountTypeParam"
        required: false
        description: type(s) of desired accounts
    get:
      description: Get a list of all accounts for the specified budget.
      operationId: getAccounts
      security:
        - budget_auth:
            - 'r:accounts'
      responses:
        200:
          description: list of accounts in budget
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not Found
        500:
          description: Internal Server Error
    post:
      description: Create a new account in the specified budget.
      operationId: createAccount
      security:
        - budget_auth:
            - 'w:accounts'
      requestBody:
        description: new account
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrReplaceAccountRequest"
      responses:
        201:
          description: created account
        #          content:
        #            application/json:
        #              schema:
        #                $ref: '#/components/schemas/GetAccount'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not Found
        409:
          description: Conflict
        500:
          description: Internal Server Error
  /budgetId/{budgetId}/accounts/{accountId}:
    parameters:
      - $ref: "#/components/parameters/budgetIdParam"
      - $ref: "#/components/parameters/accountIdParam"
    get:
      description: Get the specified account.
      operationId: getAccount
      security:
        - budget_auth:
            - 'r:accounts'
      parameters:
        - $ref: "#/components/parameters/accountTypeParam"
          required: true
          description: type of desired account
      responses:
        200:
          description: requested account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not Found
        500:
          description: Internal Server Error
    put:
      description: Replace the specified account.
      operationId: replaceAccount
      security:
        - budget_auth:
            - 'w:accounts'
      requestBody:
        description: replacement account
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrReplaceAccountRequest"
      responses:
        204:
          description: account after update
        #          content:
        #            application/json:
        #              schema:
        #                $ref: '#/components/schemas/GetAccount'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not Found
        409:
          description: Conflict
        500:
          description: Internal Server Error
    patch:
      description: Update some attributes of the specified account.
      operationId: updateAccount
      security:
        - budget_auth:
            - 'w:accounts'
      responses:
        200:
          description: account after update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not Found
        409:
          description: Conflict
        500:
          description: Internal Server Error
    delete:
      description: Delete the specified account.
      operationId: deleteAccount
      security:
        - budget_auth:
            - 'w:accounts'
      responses:
        204:
          description: account deleted
        #          content:
        #            application/json:
        #              schema:
        #                $ref: '#/components/schemas/GetAccount'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not Found
        500:
          description: Internal Server Error
  /budgets/{budgetId}/accounts/{accountId}/transactions:
    parameters:
      - $ref: "#/components/parameters/budgetIdParam"
      - $ref: "#/components/parameters/accountIdParam"
    get:
      description: Get recent transactions on the given account.
      operationId: getAccountTransactions
      security:
        - budget_auth:
            - 'r:transactions'
      parameters:
        - $ref: "#/components/parameters/transactionTypeParam"
        - name: offset
          in: query
          schema:
            format: number
        - name: limit
          in: query
          schema:
            format: number
      responses:
        200:
          description: requested account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountTransactionsResponse'
        400:
          description: Bad Request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: Not Found
        500:
          description: Internal Server Error

components:
  parameters:
    budgetIdParam:
      name: budgetId
      in: path
      required: true
      schema:
        format: uuid
        description: budget ID
    accountIdParam:
      name: accountId
      in: path
      required: true
      schema:
        format: uuid
        description: account ID
    accountTypeParam:
      name: type
      in: query
      schema:
        $ref: '#/components/schemas/accountType'
    transactionTypeParam:
      name: type
      in: query
      schema:
        $ref: '#/components/schemas/transactionType'

  schemas:
    accountType:
      type: string
      description: |
        Values should be among these:
          * real
          * category
          * charge
          * draft
    transactionType:
      type: string
      description: |
        Values should be among these:
          * expense
          * transfer
          * allowance
          * income
          * clearing
          * initial
    Links:
      type: object
      properties:
        next:
          type: string
          description: URI of next page of results
        previous:
          type: string
          description: URI of previous page of results
    AccountResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        description:
          type: string
        balance:
          type: number
        companionId:
          type: string
          description: only meaningful when `type` is `"draft"`
          format: uuid
        budgetId:
          type: string
          format: uuid
      required:
        - id
        - name
        - type
        - description
        - balance
        - budgetId
    AccountsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'
        links:
          $ref: '#/components/schemas/Links'
      required:
        - items
    CreateOrReplaceAccountRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        balance:
          type: number
        companionId:
          type: string
          description: only meaningful when `type` is `"draft"`
          format: uuid
        budgetId:
          type: string
          format: uuid
      required:
        - name
        - type
        - description
        - balance
        - budgetId
    AccountTransactionsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountTransactionResponse'
        links:
          $ref: '#/components/schemas/Links'
      required:
        - items
    AccountTransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        description:
          type: string
        amount:
          type: number
        balance:
          type: number
        accountId:
          type: string
          format: uuid
        budgetId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - amount
        - timestamp
        - accountId
        - budgetId
